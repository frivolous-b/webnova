<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Запитването е изпратено — Webnova</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .card {
      background: white; border-radius: 24px; padding: 3rem 2.5rem;
      text-align: center; max-width: 480px; width: 100%;
      box-shadow: 0 8px 40px rgba(15,23,42,.1);
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.6rem; font-weight: 800; color: #0f172a; margin-bottom: .75rem; }
    p  { font-size: .95rem; color: #64748b; line-height: 1.75; margin-bottom: 2rem; }
    .details {
      background: #f8fafc; border-radius: 12px; padding: 1.25rem;
      margin-bottom: 2rem; text-align: left;
    }
    .details div { display: flex; align-items: center; gap: .75rem; font-size: .875rem; color: #1e293b; padding: .4rem 0; }
    .details span { font-size: 1.1rem; }
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; padding: .85rem 2rem; border-radius: 12px;
      font-size: .95rem; font-weight: 600; text-decoration: none;
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,.35); }
    .logo { font-size: .85rem; color: #94a3b8; margin-top: 2rem; }
    .logo strong { color: #6366f1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Запитването е изпратено!</h1>
    <p>Благодарим ви за интереса към Webnova.<br>Ще се свържем с вас в рамките на <strong>24 часа</strong>.</p>
    <div class="details">
      <div><span>📞</span> Очаквайте обаждане от <strong>0895 615 903</strong></div>
      <div><span>💬</span> Можете да пишете и на Viber</div>
      <div><span>✉️</span> ivokarabashev@gmail.com</div>
    </div>
    <a href="/" class="btn">← Обратно към сайта</a>
    <div class="logo">Web<strong>nova</strong> · Пловдив</div>
  </div>
</body>
</html>
